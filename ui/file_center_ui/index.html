<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>File Center – wowOS</title>
  <link rel="stylesheet" href="/file-center-ui/style.css">
</head>
<body>
  <div class="nav"><a href="/">← Home</a> <a href="/settings">Settings</a></div>
  <h1>File Center</h1>
  <p class="hint">Upload, list, and manage files. Set token in Settings to access.</p>

  <div class="upload">
    <h3 style="margin-top:0;">Upload</h3>
    <form id="uploadForm">
      <input type="file" name="file" id="fileInput" required />
      <label>Level: <select name="privacy_level" id="uploadLevel">
        <option value="1">L1 Normal</option>
        <option value="2">L2 Sensitive</option>
        <option value="3" selected>L3 High</option>
      </select></label>
      <button type="submit">Upload</button>
    </form>
    <p id="uploadErr" class="err" style="display:none;"></p>
  </div>

  <div class="filter">
    <label>Filter by name: <input type="text" id="filterName" placeholder="type to filter..." /></label>
  </div>

  <table>
    <thead>
      <tr><th>Name</th><th>Level</th><th>Tags</th><th>Size</th><th>Created</th><th>Actions</th></tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
  <p id="err" class="err" style="display:none;"></p>

  <div id="detailModal">
    <div class="box">
      <h3 id="detailTitle">File detail</h3>
      <dl id="detailBody"></dl>
      <button class="close" id="detailClose">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
