# wowOS 镜像构建：在 GitHub 提供的 Linux 环境下执行完整构建，产出可烧录的 zip
name: Build wowOS Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip xz-utils file

      - name: Build image
        env:
          BUILD_DIR: ${{ github.workspace }}/build
          WOWOS_VERSION: "1.0"
        run: |
          sudo mkdir -p "$BUILD_DIR"
          sudo chown -R $USER:$USER "$BUILD_DIR"
          cd ${{ github.workspace }} && sudo -E BUILD_DIR="$BUILD_DIR" ./scripts/build_image.sh

      - name: Fix build dir ownership
        run: sudo chown -R $USER:$USER ${{ github.workspace }}/build

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wowos-image
          path: build/wowos-*.img.zip
