name: Build wowOS Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Use Node 24 early to avoid Node 20 deprecation warning (default from 2026-06)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: ${{ github.workspace }}/build
      WOWOS_VERSION: "1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip xz-utils file kpartx util-linux

      - name: Build image (prepare-only)
        run: |
          mkdir -p "$BUILD_DIR"
          sudo -E BUILD_DIR="$BUILD_DIR" WOWOS_VERSION="$WOWOS_VERSION" \
            bash "${{ github.workspace }}/scripts/build_image_prepare_only.sh"
          sudo chown -R "$USER:$USER" "$BUILD_DIR"

      - name: Verify output
        run: |
          echo "=== build dir ==="
          ls -lah "$BUILD_DIR"
          test -f "$BUILD_DIR/wowos-${WOWOS_VERSION}.img.zip"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wowos-image
          path: build/wowos-*.img.zip
          if-no-files-found: error
          retention-days: 7