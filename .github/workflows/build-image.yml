# wowOS 镜像构建：在 GitHub 的 x86 环境下做「仅准备」构建（不 chroot，避免 ARM/x86 架构冲突）
# 烧录后需在树莓派上执行一次：sudo /root/wowos-firstboot-install.sh
name: Build wowOS Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip xz-utils file kpartx

      - name: Build image (prepare-only)
        env:
          BUILD_DIR: ${{ github.workspace }}/build
          WOWOS_VERSION: "1.0"
        run: |
          mkdir -p "$BUILD_DIR"
          sudo -E BUILD_DIR="$BUILD_DIR" bash "${{ github.workspace }}/scripts/build_image_prepare_only.sh"
          sudo chown -R $USER:$USER "$BUILD_DIR"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wowos-image
          path: build/wowos-*.img.zip
