name: Build wowOS Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Use Node 24 early to avoid Node 20 deprecation warning (default from 2026-06)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      BUILD_DIR: ${{ github.workspace }}/build
      WOWOS_VERSION: "1.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (host binfmt for arm64)
        uses: docker/setup-qemu-action@v3

      - name: Build image (full build, in Docker for loop/mount)
        run: |
          mkdir -p "$BUILD_DIR"
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/wowos:rw" \
            -e BUILD_DIR=/wowos/build \
            -e WOWOS_VERSION="$WOWOS_VERSION" \
            -e WOWOS_CI=0 \
            -w /wowos \
            ubuntu:22.04 \
            bash -c '
              set -e
              apt-get update -qq && apt-get install -y -qq \
                wget curl zip xz-utils file kpartx util-linux \
                parted e2fsprogs gdisk \
                qemu-user-static binfmt-support
              echo "[DEBUG] resize2fs: $(resize2fs -V 2>&1 | head -1)"
              echo "[DEBUG] losetup: $(losetup --version 2>&1 | head -1)"
              update-binfmts --enable qemu-aarch64 || true
              BUILD_DIR=/wowos/build IMG_NAME=raspios-lite.img WOWOS_VERSION="$WOWOS_VERSION" \
                bash /wowos/scripts/build_image.sh
            '
          sudo chown -R "$USER:$USER" "$BUILD_DIR"

      - name: Verify output
        run: |
          echo "=== build dir ==="
          ls -lah "$BUILD_DIR"
          test -f "$BUILD_DIR/wowos-${WOWOS_VERSION}.img.zip"
          SIZE=$(stat -c%s "$BUILD_DIR/wowos-${WOWOS_VERSION}.img.zip" 2>/dev/null || stat -f%z "$BUILD_DIR/wowos-${WOWOS_VERSION}.img.zip")
          if [ "$SIZE" -lt 1048576 ]; then
            echo "::error::Image artifact is too small (${SIZE} bytes). Full build likely failed. Build locally: sudo BUILD_DIR=$BUILD_DIR bash scripts/build_image.sh"
            exit 1
          fi
          echo "Image size: $(( SIZE / 1024 / 1024 )) MB"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: wowos-image
          path: build/wowos-*.img.zip
          if-no-files-found: error
          retention-days: 7

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.WOWOS_VERSION }}
          name: wowOS v${{ env.WOWOS_VERSION }}
          make_latest: true
          files: build/wowos-*.img.zip
          body: |
            ## wowOS v${{ env.WOWOS_VERSION }}

            Built from commit ${{ github.sha }}

            ### 下载 / Download

            下载 `wowos-${{ env.WOWOS_VERSION }}.img.zip`，解压后使用 [Raspberry Pi Imager](https://www.raspberrypi.com/software/) 或 `dd` 命令刷入 SD 卡。

            Download `wowos-${{ env.WOWOS_VERSION }}.img.zip`, unzip, then flash to SD card with [Raspberry Pi Imager](https://www.raspberrypi.com/software/) or `dd`.

            See [BUILD.md](https://github.com/WowData-labs/wowOS/blob/main/BUILD.md) for full flash and setup instructions.